set timeout=2
set default=0

# Request a 32-bit colour framebuffer before handing off to the kernel.
# GRUB will set this video mode and pass the framebuffer address to the
# kernel via the multiboot2 framebuffer tag (type 8).
set gfxpayload=1024x768x32

menuentry "AiOS" {
    multiboot2 /boot/kernel.bin
    boot
}
